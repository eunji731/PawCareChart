spring:
  # --- [ 운영 환경용 DB 연결 ] ---
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # --- [ JPA (Hibernate) 설정 (운영) ] ---
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# --- [ 운영 환경용 로깅 설정 ] ---
logging:
  level:
    root: INFO
    com.pawcarechart: INFO

# --- [ 운영 환경용 파일 업로드 설정 ] ---
file:
  upload-dir: ${FILE_UPLOAD_DIR:/var/www/pawcare/uploads}
  base-url: ${FILE_BASE_URL:https://api.pawcarechart.com/api/files/download}
