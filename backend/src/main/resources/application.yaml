spring:
  profiles:
    active: dev

# --- [ Swagger (API 문서 자동화) 공통 설정 ] ---
springdoc:
  swagger-ui:
    # 웹 브라우저에서 API 문서를 볼 수 있는 접속 주소입니다. (http://localhost:8080/swagger-ui.html)
    path: /swagger-ui.html
    # API 목록을 GET, POST, PUT, DELETE 등 HTTP 메서드 순서대로 깔끔하게 정렬해줍니다.
    operationsSorter: method

# --- [ MyBatis 공통 설정 ] ---
mybatis:
  # MyBatis가 실행할 실제 SQL 쿼리가 적힌 XML 파일들의 위치를 지정합니다.
  mapper-locations: classpath:mapper/**/*.xml
  # XML 파일에서 결과값(resultType)을 매핑할 때, 패키지명을 길게 다 쓰지 않고 클래스 이름만 쓰게 해줍니다.
  type-aliases-package: com.pawcarechart.backend
  configuration:
    # DB의 스네이크 케이스(예: user_name)를 자바의 카멜 케이스(예: userName)로 자동 변환합니다. (매우 중요!)
    map-underscore-to-camel-case: true